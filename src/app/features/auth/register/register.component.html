<!-- Split-screen auth layout -->
<div class="min-h-screen lg:grid lg:grid-cols-2">

  <!-- ========== LEFT: Branding Panel (hidden on mobile) ========== -->
  <div
    class="hidden lg:flex flex-col items-center justify-center relative overflow-hidden
           bg-gradient-to-br from-purple-600 via-indigo-600 to-cyan-500
           dark:from-purple-900 dark:via-indigo-900 dark:to-gray-900"
  >
    <!-- Decorative blurred circles -->
    <div class="absolute -top-24 -left-24 w-96 h-96 bg-white/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 right-0 w-80 h-80 bg-cyan-400/20 rounded-full blur-2xl"></div>

    <div class="relative z-10 max-w-md text-center px-8 space-y-6">
      <!-- App icon -->
      <div class="mx-auto w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
      </div>

      <h1 class="text-4xl font-extrabold text-white tracking-tight">
        Get Started
      </h1>
      <p class="text-lg text-purple-100/80 leading-relaxed">
        Create your free account and start turning your to-do list into a done list.
      </p>
    </div>
  </div>

  <!-- ========== RIGHT: Register Form ========== -->
  <div
    class="flex items-center justify-center px-4 py-12 sm:px-6 lg:px-8
           bg-white dark:bg-gray-900 transition-colors duration-300"
  >
    <div class="w-full max-w-md space-y-8">

      <!-- Mobile-only header -->
      <div class="lg:hidden text-center space-y-2">
        <div class="mx-auto w-14 h-14 rounded-2xl bg-purple-600 flex items-center justify-center shadow-md">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Task Manager</h1>
      </div>

      <!-- Form Card -->
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700/60 p-8 sm:p-10 space-y-6">

        <div class="text-center space-y-1">
          <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Create Account</h2>
          <p class="text-sm text-gray-500 dark:text-gray-400">Fill in the details to get started</p>
        </div>

        <form class="space-y-5" (ngSubmit)="onRegister()">

          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
              Email address
            </label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              [(ngModel)]="email"
              required
              placeholder="you@example.com"
              class="block w-full h-12 px-4 rounded-xl border border-gray-200 bg-gray-50
                     text-gray-900 placeholder-gray-400
                     focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                     dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:placeholder-gray-400
                     transition-shadow text-sm"
            />
          </div>

          <!-- Password -->
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
              Password
            </label>
            <div class="relative">
              <input
                id="password"
                name="password"
                [type]="showPassword ? 'text' : 'password'"
                autocomplete="new-password"
                [(ngModel)]="password"
                required
                placeholder="At least 6 characters"
                class="block w-full h-12 px-4 pr-12 rounded-xl border border-gray-200 bg-gray-50
                       text-gray-900 placeholder-gray-400
                       focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                       dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:placeholder-gray-400
                       transition-shadow text-sm"
              />
              <button
                type="button"
                (click)="showPassword = !showPassword"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600
                       dark:text-gray-500 dark:hover:text-gray-300 focus:outline-none transition-colors"
                [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
              >
                @if (showPassword) {
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12c1.292 4.338 5.31 7.5 10.066 7.5.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
                  </svg>
                } @else {
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                }
              </button>
            </div>
          </div>

          <!-- Confirm Password -->
          <div>
            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
              Confirm Password
            </label>
            <div class="relative">
              <input
                id="confirmPassword"
                name="confirmPassword"
                [type]="showConfirmPassword ? 'text' : 'password'"
                autocomplete="new-password"
                [(ngModel)]="confirmPassword"
                required
                placeholder="Re-enter your password"
                class="block w-full h-12 px-4 pr-12 rounded-xl border border-gray-200 bg-gray-50
                       text-gray-900 placeholder-gray-400
                       focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                       dark:bg-gray-700 dark:border-gray-600 dark:text-white dark:placeholder-gray-400
                       transition-shadow text-sm"
              />
              <button
                type="button"
                (click)="showConfirmPassword = !showConfirmPassword"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600
                       dark:text-gray-500 dark:hover:text-gray-300 focus:outline-none transition-colors"
                [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'"
              >
                @if (showConfirmPassword) {
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12c1.292 4.338 5.31 7.5 10.066 7.5.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
                  </svg>
                } @else {
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                }
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            [disabled]="loading"
            class="w-full h-12 flex items-center justify-center rounded-xl text-sm font-semibold
                   text-white bg-indigo-600 hover:bg-indigo-700 active:scale-[.98]
                   focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500
                   disabled:opacity-50 disabled:cursor-not-allowed
                   dark:focus:ring-offset-gray-800
                   transition-all duration-150"
          >
            @if (loading) {
              <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
              </svg>
              <span>Creating Account…</span>
            } @else {
              <span>Create Account</span>
            }
          </button>
        </form>

        <!-- Divider -->
        <div class="relative">
          <div class="absolute inset-0 flex items-center" aria-hidden="true">
            <div class="w-full border-t border-gray-200 dark:border-gray-600"></div>
          </div>
          <div class="relative flex justify-center text-xs uppercase">
            <span class="bg-white dark:bg-gray-800 px-3 text-gray-400 dark:text-gray-500 font-medium">
              Or
            </span>
          </div>
        </div>

        <!-- Google Button -->
        <button
          type="button"
          (click)="onGoogleRegister()"
          [disabled]="loading"
          class="w-full h-12 flex items-center justify-center gap-3 rounded-xl border border-gray-200
                 text-sm font-medium text-gray-700 bg-white
                 hover:bg-gray-50 active:scale-[.98]
                 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500
                 disabled:opacity-50 disabled:cursor-not-allowed
                 dark:bg-gray-700 dark:border-gray-600 dark:text-gray-200 dark:hover:bg-gray-600
                 dark:focus:ring-offset-gray-800
                 transition-all duration-150"
        >
          <svg class="w-5 h-5" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

        <!-- Toggle link -->
        <p class="text-center text-sm text-gray-500 dark:text-gray-400">
          Already have an account?
          <a routerLink="/login"
             class="font-semibold text-indigo-600 hover:text-indigo-500 dark:text-indigo-400 dark:hover:text-indigo-300 ml-1">
            Sign in
          </a>
        </p>

      </div><!-- /card -->
    </div>
  </div>

</div>
